name: ThermaKube CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy ruff yamllint

      - name: Lint Python (Ruff)
        run: ruff check .

      - name: Lint Kubernetes YAML
        run: yamllint deployment.yaml

      - name: Validate Solver Logic
        run: |
          # Quick smoke test to ensure the math doesn't crash
          python -c "import numpy; from solver import solve_heat_equation; solve_heat_equation(size=10, iterations=5)"
