---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heat-solver-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: heat-solver
  template:
    metadata:
      labels:
        app: heat-solver
    spec:
      containers:
        - name: solver
          image: thermakube-solver:v1
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
